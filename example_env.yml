name: nudel  # can change this to any name
channels:
  - conda-forge
  - nvidia
dependencies:
  - python=3.8.6
  - gdal
  - rasterio
  - geopandas
  - matplotlib
  - scikit-learn
  - imgaug
  - tqdm
  # --- Added 2026-03-13 (venv-bubble installs) ---
  - pytorch>=2.10        # Deep learning framework (CUDA build via pip: torch --index-url https://download.pytorch.org/whl/cu128)
  - torchvision          # PyTorch vision utilities
  - torchaudio           # PyTorch audio utilities
  - tensorboard          # Training visualization (TensorBoard)
  - anyio                # Async I/O library (used in mainUnet)
  - h5py                 # HDF5 file I/O
  - optuna               # Hyperparameter tuning (Bayesian optimization)
  - albumentations       # Image augmentation library
  - notebook             # Jupyter Notebook server
  - ipykernel            # Jupyter kernel support
